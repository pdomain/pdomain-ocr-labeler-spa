# Mirrors the peer pd-* convention (see pd-prep-for-pgdp/.pre-commit-config.yaml).
# Hook list is intentionally kept in lockstep with sibling repos so a single
# `pre-commit install` works the same way across the workspace.

# `make setup` runs `pre-commit install` once; with this directive it also
# installs the post-commit / post-rewrite / post-checkout hooks (see
# `local` repo below) without requiring `--hook-type post-commit`.
#
# Fixes B-11 (post-commit) + B-17 (post-rewrite + post-checkout):
# `__version__` was drifting because hatch-vcs only re-derives the
# version on (re)install. post-commit covers vanilla `git commit`;
# post-rewrite covers `git commit --amend` and `git rebase`;
# post-checkout covers `git switch`/`git checkout` and `git
# cherry-pick` when it leaves HEAD on a different sha. All three
# converge on `make refresh-version` (via
# `scripts/refresh_version_git_hook.sh`) so the refresh entrypoint
# stays single-source.
default_install_hook_types: [pre-commit, post-commit, post-rewrite, post-checkout]

repos:
-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.9.0
    hooks:
    -   id: pre-commit-update
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-json
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
    # Run the linter for imports
    -   id: ruff-check
        args: [--select, I, --fix]
    # Automatically fix issues.
    -   id: ruff-check
        args: [--fix]
    # Run the formatter.
    -   id: ruff-format

-   repo: local
    hooks:
    # B-11 + B-17: refresh hatch-vcs derived version after any
    # ref-changing op so `pd_ocr_labeler_spa.__version__` and
    # `pd-ocr-labeler-ui --version` stay aligned with HEAD/tag state.
    #
    # All three hook stages share a single shell entry point
    # (`scripts/refresh_version_git_hook.sh`) which shells out to
    # `make refresh-version`. Failure is non-fatal — a missing
    # toolchain must not block a commit, rebase, or checkout.
    -   id: refresh-version-post-commit
        name: refresh hatch-vcs version after commit
        entry: scripts/refresh_version_git_hook.sh
        language: script
        stages: [post-commit]
        always_run: true
        pass_filenames: false
        verbose: false
    -   id: refresh-version-post-rewrite
        name: refresh hatch-vcs version after amend/rebase
        entry: scripts/refresh_version_git_hook.sh
        language: script
        stages: [post-rewrite]
        always_run: true
        pass_filenames: false
        verbose: false
    -   id: refresh-version-post-checkout
        name: refresh hatch-vcs version after checkout/cherry-pick
        entry: scripts/refresh_version_git_hook.sh
        language: script
        stages: [post-checkout]
        always_run: true
        pass_filenames: false
        verbose: false
    # B-23: lockfile drift gate. Without this, `pyproject.toml` deps
    # can drift from `uv.lock` and only surface inside `docker build`
    # (where the wheel stage runs `uv export --frozen …`). Catching
    # drift at commit time means M1+ contributors don't accidentally
    # land a stale lockfile that the release pipeline only flags
    # later. `uv lock --check` exits non-zero if `uv.lock` is not in
    # sync with `pyproject.toml` and does NOT modify the lockfile —
    # exactly the behaviour we want from a pre-commit gate.
    -   id: uv-lock-check
        name: uv.lock is in sync with pyproject.toml
        entry: uv lock --check
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
