# pnpm 11 build-script allowlist (moved from package.json "pnpm" field)
# esbuild: needs postinstall to download the platform-specific native binary
# msw: needs init script to generate the service worker
allowBuilds:
  esbuild: true
  msw: true
# minimumReleaseAgeExclude: pin our own scope (any version) so freshly
# published @pdomain/* packages don't block CI within the 24h policy
# window. Other packages still respect the 1440-minute default.
minimumReleaseAgeExclude:
  - "@pdomain/*"
# react/react-dom pinned to the app's single declared version so a locally
# linked @pdomain/pdomain-ui shares one React instance (matches
# pdomain-ocr-simple-gui) — avoids duplicate-React broken hooks.
overrides:
  react: $react
  react-dom: $react-dom
