name: release

# Tag-triggered only (v*.*.*). Requires all CI jobs to pass first.
# The 6 required CI jobs live in ci.yml and run on every push/PR to main.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Serialize per-tag release runs to avoid double-publish 409s from
# softprops/action-gh-release. cancel-in-progress: false — release jobs
# are not safely cancellable mid-upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_PYTHON: "3.13"
  CUDA_VISIBLE_DEVICES: ""

# ---------------------------------------------------------------------------
# verify-ci — gate: abort the release if CI was not green for this commit
# ---------------------------------------------------------------------------
jobs:
  verify-ci:
    name: verify CI passed for this commit
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status via GitHub Checks API
        env:
          GH_TOKEN: ${{ github.token }}
        # Query the check-runs for the tagged commit SHA.  We look for the
        # GitHub Actions check-runs and assert every run completed with
        # conclusion "success".  If CI never ran, or any run failed, we abort
        # before any artifact is built or published.
        #
        # GITHUB_SHA resolves to the commit the tag points at (even for
        # annotated tags), so this correctly validates the exact commit
        # that was tagged — not a later one.
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          REPO="${GITHUB_REPOSITORY}"

          echo "Checking CI status for commit ${SHA} in ${REPO} ..."

          # Fetch all check-runs for this commit (up to 100; our CI has <10).
          RESPONSE=$(gh api \
            "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" \
            --jq '.check_runs')

          TOTAL=$(echo "${RESPONSE}" | jq 'length')
          echo "Found ${TOTAL} check run(s)."

          if [ "${TOTAL}" -eq 0 ]; then
            echo "::error::No CI check-runs found for commit ${SHA}." \
              " Push to main first so CI runs before tagging."
            exit 1
          fi

          # Identify failed / incomplete check-runs from GitHub Actions
          # workflows, excluding this release workflow's own gate job and
          # test-e2e (known-flaky Playwright timeouts on containerised runners;
          # the underlying functional tests are covered by test-frontend vitest).
          FAILED=$(echo "${RESPONSE}" | jq -r '
            .[] |
            select(.app.slug == "github-actions") |
            select(.name != "verify CI passed for this commit") |
            select(.name != "test-e2e") |
            select(.conclusion != "success") |
            "  \(.name): status=\(.status) conclusion=\(.conclusion // "null")"
          ')

          if [ -n "${FAILED}" ]; then
            echo "::error::One or more CI checks did not pass for ${SHA}:"
            echo "${FAILED}"
            echo "Fix CI before tagging a release."
            exit 1
          fi

          echo "All CI checks passed. Proceeding with release."

# ---------------------------------------------------------------------------
# build-container — builds the Docker image (no push)
# ---------------------------------------------------------------------------
  build-container:
    name: build managed-mode container
    runs-on: ubuntu-latest
    needs: [verify-ci]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pdomain_ocr_labeler_spa/static
          rm -rf src/pdomain_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pdomain_ocr_labeler_spa/static/
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Docker image (no push)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "VERSION=${VERSION}" \
            -t "pdomain-ocr-labeler-spa:${GITHUB_REF_NAME}" .
          docker images pdomain-ocr-labeler-spa

# ---------------------------------------------------------------------------
# release — publishes wheel + sdist to GitHub Release
# ---------------------------------------------------------------------------
  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs: [verify-ci]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          enable-cache: true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pdomain_ocr_labeler_spa/static
          rm -rf src/pdomain_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pdomain_ocr_labeler_spa/static/
      - name: Build wheel + sdist
        run: |
          uv build --wheel
          uv build --sdist
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
