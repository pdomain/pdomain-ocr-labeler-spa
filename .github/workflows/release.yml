# Release workflow: builds the wheel + sdist on `v*` tag pushes and
# attaches them as assets to the GitHub Release for that tag.
#
# install.sh / install.ps1 download the published wheel from the
# Release attached here (no `git+` install path, so end users don't
# need Node/npm to build the SPA). There is no PyPI publish — see
# Q-A10 in OPEN_QUESTIONS.md for the deferred PyPI decision.
#
# Mirrors pd-prep-for-pgdp/.github/workflows/release.yml in shape but
# scoped to the publish-on-tag path only. GitHub Actions branch-CI is
# not yet configured for this repo (no `ci.yml` workflow exists);
# `make ci` is the local equivalent and runs in pre-commit / on
# contributor laptops today. (B-36)

name: release

on:
  push:
    # B-29: PEP-440-shaped release tags only — `vMAJOR.MINOR.PATCH`
    # plus the optional `-rc1` / `-beta1` / `-pre` suffix form. This
    # rejects strays like `vfeature-test`, `vbeta` (no version), or
    # `v0.0` (the deprecated retag-target removed in B-09) so they
    # don't trigger a junk Release that `install.sh`'s
    # `/releases/latest` would otherwise surface to end users.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# B-30: serialize per-tag release runs so two near-simultaneous
# `git push --tags` operations (or a "Re-run all jobs" mid-publish)
# don't double-publish the same Release assets and surface as
# `409 Conflict` from softprops/action-gh-release. `cancel-in-progress:
# false` because release jobs are not safely cancellable mid-upload —
# we'd rather queue the second run than abort the first.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: build + publish wheel
    runs-on: ubuntu-latest
    # Tag pushes attach the wheel + sdist to the GitHub Release; the
    # action below needs `contents: write` to create/update the
    # Release. Scoped to this job (not the workflow) per least-
    # privilege.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs needs full history (and the tag) to derive the
          # version. Without fetch-depth: 0 the build produces a
          # `0.0.0` placeholder and the wheel filename loses the
          # version that `install.sh` is looking for.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Pinned to match mise.toml. Bump both together so the
          # devcontainer and CI stay aligned.
          node-version: "24"
          # B-37: npm cache disabled until Q-A8 unblocks a checked-in
          # `frontend/package-lock.json`. `actions/setup-node@v4`
          # treats a missing `cache-dependency-path` target as a hard
          # error ("Dependencies lock file is not found in …") rather
          # than a graceful no-op — which would fail the workflow at
          # the Setup Node.js step BEFORE the iter-26 two-pass install
          # gets a chance to bootstrap the lockfile, silently
          # re-opening B-28. Re-enable `cache: "npm"` +
          # `cache-dependency-path: frontend/package-lock.json` in the
          # iter that closes Q-A8 and lands the real lockfile.
          # The uv cache is still primed below (`enable-cache: true`
          # on setup-uv) — uv.lock exists today, so that side pays
          # off immediately.

      - uses: astral-sh/setup-uv@v4
        with:
          # B-34: `python-version` is intentionally NOT set here.
          # `astral-sh/setup-uv` only installs the `uv` binary; the
          # `python-version` parameter pre-provisions a uv-managed
          # Python (which is useful for `uv run` paths). This workflow
          # only invokes `uv build`, which spawns a build-isolated env
          # via PEP 517 and provisions its own Python — so a setup-uv
          # `python-version` pin would download Python 3.13 only to
          # have `uv build` ignore it. mise.toml stays the single
          # source of truth for Python version. If a future step re-
          # adds `python-version:` (e.g. setup-python@v5), the
          # `test_python_pin_in_release_workflow_matches_mise_if_set`
          # drift-check pins it to mise.toml.
          # B-31: cache `~/.cache/uv` between runs. `uv build`
          # populates this with build-isolated env wheels (hatchling,
          # hatch-vcs, etc.); priming saves 10–20s of resolver work
          # on warm runs.
          enable-cache: true

      - name: Build SPA bundle
        # B-28 / B-19 / B-38: keep this block IDENTICAL in shell to
        # the corresponding block in `Dockerfile` (stage `spa`) — both
        # run the same two-pass install so behaviour is unified. The
        # cross-file anti-drift test
        # (`test_dockerfile_and_release_workflow_agree_on_npm_install_logic`)
        # pins `npm ci`, `--package-lock-only`, AND `--include=dev`
        # in both files so a future runner that sets
        # `NODE_ENV=production` (or a future GHA default change) can't
        # silently break `npm run build` here without also breaking
        # docker.
        #
        # Two-pass install: `npm ci` is the right primitive for CI
        # (fails fast on lockfile drift, never mutates the lock), but
        # it requires `package-lock.json` to exist. Q-A8 (Node not in
        # devcontainer) means the lockfile cannot yet be generated and
        # committed by hand. Until Q-A8 is unblocked, the first pass
        # generates the lockfile in-place when missing
        # (`npm install --package-lock-only --include=dev`); the
        # second pass is the canonical `npm ci --include=dev`. Once a
        # real, hand-curated lockfile is committed, the first pass
        # becomes a fast no-op (the file already exists) and `npm ci`
        # stays the source of truth.
        #
        # `--include=dev` is explicit (not relying on the npm default)
        # because `npm run build` needs vite + tsc devDependencies and
        # we don't want a future `NODE_ENV=production` env to silently
        # omit them.
        #
        # `npm run build` writes to `frontend/dist/`; the hatchling
        # build hook in pyproject.toml force-includes that directory
        # into `src/pd_ocr_labeler_spa/static/` inside the wheel, and
        # `build_hooks/spa_check.py` refuses to build a wheel without
        # an `index.html` present.
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --include=dev
          fi
          npm ci --include=dev
          npm run build

      - name: Build wheel + sdist
        # `uv build` produces both `dist/*.whl` and `dist/*.tar.gz`.
        # No PYPI_TOKEN, no twine — see Q-A10.
        run: uv build

      - name: Verify wheel contains SPA bundle
        # Belt-and-braces: build_hooks/spa_check.py already gates
        # this, but a regression there would silently ship a blank-
        # page wheel. Catches it before the Release is published.
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::no wheel produced under dist/"
            exit 1
          fi
          for whl in "${wheels[@]}"; do
            echo "checking $whl"
            if ! python -m zipfile -l "$whl" | grep -q 'pd_ocr_labeler_spa/static/index\.html'; then
              echo "::error::$whl is missing pd_ocr_labeler_spa/static/index.html — frontend-build did not run"
              python -m zipfile -l "$whl"
              exit 1
            fi
          done

      - name: Publish wheel + sdist to GitHub Release
        # Creates the Release for the tag if missing, otherwise
        # uploads the assets to the existing Release. install.sh
        # resolves the wheel via the `releases/latest` endpoint and
        # downloads the `*.whl` asset attached here.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

# PyPI publishing is intentionally NOT wired here. If/when it lands it
# must use OIDC trusted publishing (pypa/gh-action-pypi-publish with
# `permissions: id-token: write`), never a PYPI_TOKEN secret. See
# Q-A10 in OPEN_QUESTIONS.md.
