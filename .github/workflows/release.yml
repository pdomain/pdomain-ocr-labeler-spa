name: release

# Tag-triggered only (v*.*.*). Requires all CI jobs to pass first.
# The 6 required CI jobs live in ci.yml and run on every push/PR to main.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Serialize per-tag release runs to avoid double-publish 409s from
# softprops/action-gh-release. cancel-in-progress: false — release jobs
# are not safely cancellable mid-upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_PYTHON: "3.13"
  CUDA_VISIBLE_DEVICES: ""

# ---------------------------------------------------------------------------
# build-container — builds the Docker image (no push)
# ---------------------------------------------------------------------------
jobs:
  build-container:
    name: build managed-mode container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pd_ocr_labeler_spa/static
          rm -rf src/pd_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pd_ocr_labeler_spa/static/
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Docker image (no push)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "VERSION=${VERSION}" \
            -t "pd-ocr-labeler-spa:${GITHUB_REF_NAME}" .
          docker images pd-ocr-labeler-spa

# ---------------------------------------------------------------------------
# release — publishes wheel + sdist to GitHub Release
# ---------------------------------------------------------------------------
  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          enable-cache: true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pd_ocr_labeler_spa/static
          rm -rf src/pd_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pd_ocr_labeler_spa/static/
      - name: Build wheel + sdist
        run: |
          uv build --wheel
          uv build --sdist
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
