name: release

# Tag-triggered only (v*.*.*). Requires all CI jobs to pass first.
# The 6 required CI jobs live in ci.yml and run on every push/PR to main.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Serialize per-tag release runs to avoid double-publish 409s from
# softprops/action-gh-release. cancel-in-progress: false — release jobs
# are not safely cancellable mid-upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_PYTHON: "3.13"
  CUDA_VISIBLE_DEVICES: ""

# ---------------------------------------------------------------------------
# build-container — builds the Docker image (no push)
# ---------------------------------------------------------------------------
jobs:
  build-container:
    name: build managed-mode container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --include=dev
          fi
          npm ci --include=dev
          npm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pd_ocr_labeler_spa/static
          rm -rf src/pd_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pd_ocr_labeler_spa/static/
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "VERSION=${VERSION}" \
            -t "pd-ocr-labeler-spa:${GITHUB_REF_NAME}" .
          docker images pd-ocr-labeler-spa

# ---------------------------------------------------------------------------
# release — publishes wheel + sdist to GitHub Release
# ---------------------------------------------------------------------------
  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install frontend deps + build SPA
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --include=dev
          fi
          npm ci --include=dev
          npm run build
      - name: Copy bundle to static/
        run: |
          mkdir -p src/pd_ocr_labeler_spa/static
          rm -rf src/pd_ocr_labeler_spa/static/*
          cp -r frontend/dist/. src/pd_ocr_labeler_spa/static/
      - name: Build wheel + sdist
        run: |
          uv build --wheel
          uv build --sdist
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
